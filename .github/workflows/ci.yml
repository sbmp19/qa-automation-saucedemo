name: CI — Tests SauceDemo

# Se ejecuta automáticamente al hacer push a la rama main
on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 1. Descarga el código del repositorio
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      # 2. Instala la versión de Python especificada
      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Instala las dependencias desde requirements.txt
      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Instala solo el navegador Chromium (el único que usamos)
      - name: Instalar navegadores de Playwright
        run: python -m playwright install chromium

      # 5. Ejecuta todos los tests y genera el reporte HTML
      - name: Ejecutar tests
        run: python -m pytest

      # 6. Sube el reporte HTML como artefacto descargable
      - name: Subir reporte HTML como artefacto
        uses: actions/upload-artifact@v4
        if: always()  # Se ejecuta incluso si los tests fallan
        with:
          name: reporte-test
          path: reports/
